name: deploy-site

# Deploy the sshache.com static site (site/) to Cloudflare Pages on every push
# to main that touches it. Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "wrangler.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --project-name=sshache
