# Cloudflare deploy config for the sshache.com site (the static `site/` folder).
# Uses Workers Static Assets: `npx wrangler deploy` uploads site/ as assets —
# there is NO build step (the site is prebuilt HTML/CSS).
#
# In the Cloudflare project → Settings → Build:
#   Root directory:   /                     (NOT /site)
#   Build command:    (leave empty)
#   Deploy command:   npx wrangler deploy
name = "sshache"
compatibility_date = "2025-01-01"

[assets]
directory = "./site"
